name: release

on:
  push:
    tags: ['*']

# The tag is the trigger and CHANGELOG.md is the source: pushing a tag publishes a
# release with that version's section as its notes, so the changelog stays the one
# place a release is written.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract the changelog section for this tag
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"

          # Everything between "## [1.2.3]" and the next "## [" heading.
          awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > notes.md

          # A tag with no changelog entry is a mistake worth failing on: the release
          # would otherwise be published empty and nobody would notice.
          if [ ! -s notes.md ]; then
            echo "::error::CHANGELOG.md has no '## [$VERSION]' section — add one before tagging."
            exit 1
          fi

          # Trim the blank lines the split leaves at either end.
          awk '
            NF { seen = 1 }
            seen { line[++n] = $0 }
            END {
              while (n > 0 && line[n] ~ /^[[:space:]]*$/) { n-- }
              for (i = 1; i <= n; i++) { print line[i] }
            }
          ' notes.md > trimmed.md
          mv trimmed.md notes.md

      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file notes.md \
            --verify-tag
